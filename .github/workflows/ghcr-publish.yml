name: 发布GHCR镜像

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本标签（如 v0.3.2 或 latest）'
        required: true
        default: 'latest'
      push_latest:
        description: '同时推送 latest 标签'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 构建并推送到GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.inputs.version }}
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest }}

      - name: 构建前端
        run: |
          cd frontend
          npm install
          # 注入版本号到设置页
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/{{VERSION}}/$VERSION/g" src/views/page/setting/index.vue
          npm run build

      - name: 设置 QEMU（支持多架构）
        uses: docker/setup-qemu-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: 输出镜像信息
        run: |
          echo "✅ 镜像已成功推送到 GHCR"
          echo "📦 镜像地址: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "🏷️  标签: ${{ steps.meta.outputs.tags }}"
          echo ""
          echo "使用以下命令拉取镜像:"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}"
